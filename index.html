<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rufo Paredes</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,200;0,300;0,400;0,500;1,200;1,300&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── TOKENS ── */
    :root {
      --copper:      #c8561a;
      --copper-lt:   #e07838;
      --copper-pale: rgba(200, 86, 26, 0.12);
      --copper-glow: rgba(200, 86, 26, 0.22);
      --black:       #0c0c0c;
      --surface:     #141414;
      --border:      rgba(255, 255, 255, 0.06);
      --border-warm: rgba(200, 86, 26, 0.20);
      --white:       #f2ede7;
      --gray:        #555;
    }

    /* ── BASE ── */
    html, body {
      background: linear-gradient(160deg, #0c0c0c 0%, #1a0a04 40%, #0c0c0c 100%);
      background-attachment: fixed;
      font-family: 'Jost', sans-serif;
      color: var(--white);
      min-height: 100vh;
    }

    /* ── PAGE WRAPPER ── */
    .page {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ════════════════════════════════════
       LANG TOGGLE — fixed top right
    ════════════════════════════════════ */
    #lang-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 999;
      display: flex;
      align-items: center;
      background: rgba(20, 20, 20, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-warm);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #lang-toggle .lang-btn {
      padding: 7px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
      user-select: none;
      transition: background 0.2s, color 0.2s;
    }
    #lang-toggle .lang-btn.active {
      background: var(--copper);
      color: #fff;
      border-radius: 20px;
    }
    #lang-toggle .lang-sep {
      width: 1px;
      height: 14px;
      background: var(--border-warm);
      flex-shrink: 0;
    }


    /* ════════════════════════════════════
       IDENTITY (name + handle + socials)
    ════════════════════════════════════ */
    .identity {
      width: 100%;
      padding: 48px 24px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .identity__avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--copper);
      margin-bottom: 14px;
      margin-top: 4px;
    }
    .identity__name {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--white);
      text-align: center;
      margin-bottom: 4px;
    }
    .identity__handle {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray);
      text-align: center;
      margin-bottom: 18px;
    }
    .identity__socials {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border-warm);
      border-radius: 20px;
      padding: 8px 16px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .social-btn:hover { background: rgba(200,86,26,0.08); }
    .social-btn svg {
      width: 14px;
      height: 14px;
      fill: var(--copper-lt);
      flex-shrink: 0;
    }
    .social-btn__label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--copper-lt);
    }

    /* ── DIVIDER ── */
    .divider {
      width: calc(100% - 48px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border-warm), transparent);
      margin: 20px 24px 22px;
    }

    /* ════════════════════════════════════
       CONTENT AREA
    ════════════════════════════════════ */
    .content {
      width: 100%;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── SECTION LABEL ── */
    .sec-label {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    /* ── TOGGLE BUTTON (shared) ── */
    .toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border-warm);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--copper);
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 14px;
      margin-bottom: 2px;
    }
    .toggle-btn:hover { background: var(--copper-pale); }
    .toggle-btn__arrow {
      display: inline-block;
      font-size: 12px;
      transition: transform 0.3s ease;
    }

    /* ── DROPDOWN PANEL (shared) ── */
    .dropdown {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.4s ease, opacity 0.3s ease;
    }
    .dropdown.open {
      opacity: 1;
    }
    .dropdown__inner {
      padding-top: 14px;
      border-top: 1px solid var(--border);
      margin-top: 14px;
    }

    /* ════════════════════════════════════
       COLAB CARD
    ════════════════════════════════════ */
    .colab-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-warm);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .colab-card:hover { border-color: var(--copper); }
    .colab-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 140px; height: 140px;
      background: radial-gradient(circle at top right, rgba(200,86,26,0.10), transparent 70%);
      pointer-events: none;
    }
    .colab-card__top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .colab-card__logo {
      font-size: 28px;
      font-weight: 200;
      font-style: italic;
      letter-spacing: 0.04em;
      color: var(--white);
    }
    .colab-card__dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--copper);
      box-shadow: 0 0 8px var(--copper-glow);
      margin-left: 4px;
      vertical-align: middle;
    }
    .colab-card__tag {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--copper);
      border: 1px solid var(--border-warm);
      border-radius: 20px;
      padding: 3px 10px;
    }
    .colab-card__desc {
      font-size: 13px;
      line-height: 1.7;
      color: #d4cfc9;
      margin-bottom: 4px;
    }
    .colab-card__cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--copper);
      border-radius: 10px;
      padding: 13px 16px;
      margin-top: 16px;
      cursor: pointer;
    }
    .colab-card__cta-text {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #fff;
    }
    .colab-card__cta-arrow {
      font-size: 16px;
      color: rgba(255,255,255,0.55);
    }

    /* ════════════════════════════════════
       ABOUT CARD
    ════════════════════════════════════ */
    .about-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .about-card__label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--copper);
      margin-bottom: 12px;
    }
    .about-card__text {
      font-size: 13px;
      line-height: 1.75;
      color: #d4cfc9;
    }
    .about-card__text strong { color: #e0dbd5; font-weight: 400; }
    .about-card__continuation {
      font-size: 13px;
      line-height: 1.8;
      color: #d4cfc9;
    }

    /* ── HOBBIES ── */
    .hobbies-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .hobby-tag {
      background: var(--copper-pale);
      border: 1px solid var(--border-warm);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--copper-lt);
    }

    /* ════════════════════════════════════
       LINK BUTTON (featured in items)
    ════════════════════════════════════ */
    .link-btn {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      text-decoration: none;
      transition: border-color 0.2s;
      cursor: pointer;
    }
    .link-btn:hover { border-color: var(--border-warm); }
    .link-btn__left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .link-btn__icon {
      width: 36px; height: 36px;
      border-radius: 9px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .link-btn__title {
      font-size: 13px;
      font-weight: 400;
      color: var(--white);
      display: block;
    }
    .link-btn__sub {
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 0.04em;
      display: block;
      margin-top: 2px;
    }
    .link-btn__arrow {
      font-size: 13px;
      color: rgba(255,255,255,0.12);
    }
    .featured-group { width: 100%; margin-bottom: 20px; }

    /* ════════════════════════════════════
       IDEAS CARD
    ════════════════════════════════════ */
    .ideas-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      transition: border-color 0.2s;
      cursor: pointer;
    }
    .ideas-card:hover { border-color: var(--border-warm); }
    .ideas-card__header {
      padding: 16px 18px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      background: linear-gradient(135deg, rgba(200,86,26,0.07) 0%, transparent 60%);
    }
    .ideas-card__title {
      font-size: 22px;
      font-weight: 200;
      letter-spacing: 0.03em;
      color: var(--white);
      line-height: 1.1;
    }
    .ideas-card__title em {
      font-style: italic;
      font-weight: 300;
      color: var(--copper-lt);
    }
    .ideas-card__badge {
      background: var(--copper-pale);
      border: 1px solid var(--border-warm);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 10px;
      color: var(--copper-lt);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .ideas-card__list { padding: 0 18px 14px; }
    .ideas-card__row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-top: 1px solid var(--border);
    }
    .ideas-card__num {
      font-size: 12px;
      color: var(--copper);
      width: 28px;
      flex-shrink: 0;
    }
    .ideas-card__item { font-size: 12px; color: #d4cfc9; flex: 1; }
    .ideas-card__cta {
      background: rgba(200,86,26,0.06);
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ideas-card__cta-text {
      font-size: 11px;
      color: var(--copper-lt);
      letter-spacing: 0.06em;
    }
    .ideas-card__cta-arrow { font-size: 14px; color: var(--copper); }

    /* ════════════════════════════════════
       CONTACT
    ════════════════════════════════════ */
    .contact-row {
      width: 100%;
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .contact-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border-warm);
      border-radius: 12px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      transition: background 0.2s;
      cursor: pointer;
    }
    .contact-btn:hover { background: rgba(200,86,26,0.08); }
    .contact-btn__icon { font-size: 18px; }
    .contact-btn__label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }
    .contact-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .contact-form__input,
    .contact-form__textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-warm);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    .contact-form__input:focus,
    .contact-form__textarea:focus { border-color: var(--copper); }
    .contact-form__input::placeholder,
    .contact-form__textarea::placeholder { color: var(--gray); }
    .contact-form__btn {
      align-self: flex-end;
      background: var(--copper);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 10px 24px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .contact-form__btn:hover { background: var(--copper-lt); }
    .contact-form__success {
      font-size: 12px;
      color: var(--copper-lt);
      text-align: center;
      padding: 8px 0;
      display: none;
    }
    .contact-form__input--error {
      border-color: #e05555 !important;
    }

    /* ── FOOTER ── */
    .footer-brand {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.07);
      text-align: center;
    }
    /* ════════════════════════════════════
       IDEAS PAGE
    ════════════════════════════════════ */
    .ideas-page__header {
      width: 100%;
      padding: 20px 20px 0;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--border-warm);
      border-radius: 20px;
      padding: 7px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--copper-lt);
      cursor: pointer;
      margin-bottom: 24px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: var(--copper-pale); }
    .back-btn__arrow { font-size: 14px; }
    .ideas-page__eyebrow {
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--copper);
      margin-bottom: 6px;
    }
    .ideas-page__title {
      font-size: 30px;
      font-weight: 200;
      letter-spacing: 0.04em;
      color: var(--white);
      margin-bottom: 8px;
      line-height: 1.15;
    }
    .ideas-page__title em {
      font-style: italic;
      font-weight: 300;
      color: var(--copper-lt);
    }
    .ideas-page__sub {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    /* IDEA CARD */
    .idea-item {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .idea-item:hover { border-color: var(--border-warm); }
    .idea-item__top { display: none; }
    .idea-item__num {
      font-size: 12px;
      font-weight: 500;
      color: var(--copper);
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .idea-item__tag { display: none; }
    .idea-item__title {
      font-size: 16px;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 10px;
      line-height: 1.3;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .idea-item__desc {
      font-size: 12px;
      line-height: 1.75;
      color: rgba(255,255,255,0.55);
      margin-bottom: 14px;
    }
    .idea-item__section {
      margin-bottom: 12px;
    }
    .idea-item__section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--copper-lt);
      margin-bottom: 4px;
    }
    .idea-item__section-text {
      font-size: 12px;
      line-height: 1.7;
      color: rgba(255,255,255,0.5);
    }
    .idea-item__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .idea-item__meta-pill {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
    }
    .idea-item__meta-pill--highlight {
      color: var(--copper-lt);
      border-color: var(--border-warm);
      background: var(--copper-pale);
    }
    a.idea-item__video-btn {
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      background: var(--copper);
      border-radius: 20px;
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    a.idea-item__video-btn:hover { background: #b04a16; }
    .ideas-page__coming-soon {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.1);
      text-align: center;
      padding: 24px 0 8px;
    }
    .ideas-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      padding: 48px 0;
    }
    .ideas-loading span {
      width: 8px;
      height: 8px;
      background: var(--copper);
      border-radius: 50%;
      animation: ideasDot 1s infinite ease-in-out;
    }
    .ideas-loading span:nth-child(2) { animation-delay: 0.15s; }
    .ideas-loading span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes ideasDot {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1.2); }
    }

    /* ════════════════════════════════════
       FEATURED CAROUSEL
    ════════════════════════════════════ */
    .featured-carousel-card {
      padding: 0 0 16px 0 !important;
      overflow: hidden;
    }
    .carousel-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 14px 14px 0 0;
    }
    .carousel-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s ease;
    }
    .carousel-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
      text-align: center;
      margin: 14px 20px 10px;
      letter-spacing: 0.02em;
    }
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 7px;
    }
    .carousel-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border-warm);
      cursor: pointer;
      transition: background 0.3s;
    }
    .carousel-dot.active {
      background: var(--copper);
    }
    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(12,12,12,0.55);
      border: 1px solid var(--border-warm);
      color: var(--white);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      z-index: 10;
      user-select: none;
      transition: background 0.2s, border-color 0.2s;
      backdrop-filter: blur(6px);
    }
    .carousel-arrow:hover { background: var(--copper); border-color: var(--copper); }

    /* ════════════════════════════════════

    var lang = 'es';

    /* ════════════════════════════════════
       APPLY LANGUAGE
    ════════════════════════════════════ */
    function applyLang(newLang) {
      lang = newLang;
      var t = T[lang];

      /* update all data-key elements */
      var els = document.querySelectorAll('[data-key]');
      for (var i = 0; i < els.length; i++) {
        var key = els[i].getAttribute('data-key');
        if (t[key] !== undefined) {
          els[i].innerHTML = t[key];
        }
      }

      /* toggle button labels — respect open/closed state */
      document.getElementById('colab-toggle-label').innerHTML =
        dropdowns.colab ? t['ver-menos'] : t['ver-mas'];
      document.getElementById('about-toggle-label').innerHTML =
        dropdowns.about ? t['ver-menos'] : t['ver-mas'];

      /* copy button */
      var copyBtn = document.getElementById('copy-btn');
      if (copyBtn) copyBtn.innerHTML = t['copy-btn'];

      /* active lang button */
      var btns = document.querySelectorAll('#lang-toggle .lang-btn');
      for (var j = 0; j < btns.length; j++) {
        btns[j].classList.toggle('active', btns[j].getAttribute('data-lang') === lang);
      }

      document.documentElement.lang = lang;

      /* carousel title translation */
      if (typeof carouselSlides !== 'undefined') {
        var s = carouselSlides[carouselIdx];
        document.getElementById('carousel-title').textContent = lang === 'en' ? (s.titleEn || s.title) : s.title;
        var detailTitle = document.getElementById('feat-detail-title');
        if (detailTitle.textContent) {
          detailTitle.textContent = lang === 'en' ? (s.titleEn || s.title) : s.title;
        }
      }

      /* reload ideas in new language if already loaded */
      if (typeof lastIdeasData !== 'undefined' && lastIdeasData) {
        renderIdeas(lastIdeasData);
      }
    }

    /* ════════════════════════════════════
       TOGGLE DROPDOWN
    ════════════════════════════════════ */
    function toggleSection(id) {
      dropdowns[id] = !dropdowns[id];
      var isOpen    = dropdowns[id];
      var dropdown  = document.getElementById(id + '-dropdown');
      var arrow     = document.getElementById(id + '-toggle-arrow');
      var label     = document.getElementById(id + '-toggle-label');
      var inner     = dropdown.querySelector('.dropdown__inner');

      if (isOpen) {
        dropdown.style.maxHeight  = (inner.scrollHeight + 40) + 'px';
        dropdown.style.opacity    = '1';
        arrow.style.transform     = 'rotate(180deg)';
        label.innerHTML           = T[lang]['ver-menos'];
      } else {
        dropdown.style.maxHeight  = '0';
        dropdown.style.opacity    = '0';
        arrow.style.transform     = 'rotate(0deg)';
        label.innerHTML           = T[lang]['ver-mas'];
      }
    }

    function copyContactEmail() {
      navigator.clipboard.writeText('info@rufoparedes.com').then(function() {
        var btn = document.getElementById('copy-email-btn');
        btn.textContent = '¡Copiado!';
        btn.style.background = 'rgba(200,86,26,0.3)';
        setTimeout(function() {
          btn.textContent = 'Copiar';
          btn.style.background = 'rgba(200,86,26,0.15)';
        }, 2000);
      });
    }

    function submitContactForm(e) {
      e.preventDefault();
      const nameField    = document.getElementById('contact-name');
      const emailField   = document.getElementById('contact-email');
      const messageField = document.getElementById('contact-message');
      let valid = true;
      const subjectField = document.getElementById('contact-subject');
      [nameField, emailField, subjectField, messageField].forEach(f => {
        if (!f.value.trim()) { f.classList.add('contact-form__input--error'); valid = false; }
        else f.classList.remove('contact-form__input--error');
      });
      if (!valid) return;

      const name    = nameField.value.trim();
      const email   = emailField.value.trim();
      const phone   = document.getElementById('contact-phone').value.trim();
      const subject = subjectField.value.trim();
      const message = messageField.value.trim();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      fetch('https://rufoparedesemail.paredesrufo.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre: name, correo: email, telefono: phone, asunto: subject, mensaje: message })
      })
      .then(res => {
        if (res.ok) {
          document.getElementById('contact-form').reset();
          const success = document.getElementById('contact-success');
          success.style.display = 'block';
          setTimeout(() => { success.style.display = 'none'; }, 4000);
        } else {
          alert('Hubo un error al enviar. Intenta de nuevo.');
        }
      })
      .catch(() => alert('Hubo un error al enviar. Intenta de nuevo.'))
      .finally(() => {
        btn.disabled = false;
        btn.textContent = 'Enviar';
      });
    }

    ['contact-name', 'contact-email', 'contact-subject', 'contact-message'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        this.classList.remove('contact-form__input--error');

    });

    document.getElementById('lang-toggle').addEventListener('click', function(e) {
      var btn = e.target.closest('.lang-btn');

    /* ════════════════════════════════════
       SHOW VIEW
    ════════════════════════════════════ */
    function showView(id, pushState) {
      // Stop any playing video/audio before switching views
      var videoWrap = document.getElementById('feat-detail-video-wrap');
      if (videoWrap) videoWrap.innerHTML = '';

      document.getElementById('view-main').style.display     = id === 'main'     ? 'block' : 'none';
      document.getElementById('view-ideas').style.display    = id === 'ideas'    ? 'block' : 'none';
      document.getElementById('view-featured').style.display = id === 'featured' ? 'block' : 'none';
      window.scrollTo(0, 0);
      if (id === 'ideas') loadIdeas();
      // Update URL hash
      if (pushState !== false) {
        var hash = id === 'main' ? '' : '#' + id;
        history.pushState({ view: id }, '', window.location.pathname + hash);
      }
    }

    // Handle browser back/forward buttons
    window.addEventListener('popstate', function(e) {
      var id = (e.state && e.state.view) ? e.state.view : 'main';
      showView(id, false);
    });

    // On load, read hash to open correct view
    (function() {
      var hash = window.location.hash.replace('#', '');

    /* ════════════════════════════════════
       IDEAS — GOOGLE SHEETS CSV LOADER
    ════════════════════════════════════ */
    var IDEAS_CSV_RAW = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLA7gRUMbfgT0FFeKWGSIWqQu5OQNbvU_V6-_6vNk0Du8CmE5-no_iRgz63SsX7xRg5m33yc_NzJ4-/pub?output=csv';
    var IDEAS_CSV_PROXY = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(IDEAS_CSV_RAW);

    function parseCSV(text) {
      var rows = [];
      var row = [];
      var field = '';
      var inQuotes = false;
      var i = 0;
      while (i < text.length) {
        var ch = text[i];
        if (inQuotes) {
          if (ch === '"' && text[i + 1] === '"') { field += '"'; i += 2; continue; }
          if (ch === '"') { inQuotes = false; i++; continue; }
          field += ch;
        } else {
          if (ch === '"') { inQuotes = true; i++; continue; }
          if (ch === ',') { row.push(field.trim()); field = ''; i++; continue; }
          if (ch === '\n') {
            row.push(field.trim());
            rows.push(row);
            row = []; field = '';
            i++;
            continue;
          }
          if (ch === '\r') { i++; continue; }
          field += ch;
        }
        i++;
      }
      if (field || row.length) { row.push(field.trim()); rows.push(row); }
      return rows;
    }

    function renderIdeas(rows) {
      var list = document.getElementById('ideas-list');
      var isEn = lang === 'en';
      var whyLabel = isEn ? 'Why is it a good idea?' : '¿Por qué es buena idea?';
      var howLabel = isEn ? 'How to implement?'      : '¿Cómo implementar?';
      var btnLabel = isEn ? 'Watch Video'            : 'Ver Video';

      // Map column headers to indexes
      var headers = rows[0] || [];
      var idx = {};
      for (var h = 0; h < headers.length; h++) {
        idx[headers[h].trim()] = h;
      }

      // Helper to get column value with fallback
      function col(row, nameEs, nameEn) {
        var name = (isEn && idx[nameEn] !== undefined) ? nameEn : nameEs;
        return (idx[name] !== undefined ? row[idx[name]] : '') || '';
      }

      // collect valid data rows
      var data = [];
      for (var r = 1; r < rows.length; r++) {
        var cols = rows[r];
        if (!cols || !col(cols, 'Título ES', 'Título EN')) continue;
        data.push(cols);
      }
      data.sort(function(a, b) {
        return parseFloat(b[idx['Número']||0]||0) - parseFloat(a[idx['Número']||0]||0);
      });

      // update badge count
      var badge = document.querySelector('.ideas-card__badge');
      if (badge) badge.textContent = data.length + ' ideas';

      // update preview list (top 3) — always in ES
      var preview = document.getElementById('ideas-preview-list');
      if (preview) {
        var pHtml = '';
        for (var i = 0; i < Math.min(3, data.length); i++) {
          var num = data[i][idx['Número']||0] || '';
          var title = col(data[i], 'Título ES', 'Título EN');
          pHtml += '<div class="ideas-card__row"><span class="ideas-card__num">#' + num + '</span><span class="ideas-card__item">' + title + '</span></div>';
        }
        preview.innerHTML = pHtml || '';
      }

      // render full ideas list
      var html = '';
      for (var j = 0; j < data.length; j++) {
        var c = data[j];
        var num2    = c[idx['Número']||0] || '';
        var title2  = col(c, 'Título ES',      'Título EN');
        var desc    = col(c, 'Descripción ES', 'Descripción EN');
        var why     = col(c, 'Porque ES',      'Porque EN');
        var how     = col(c, 'Como ES',        'Como EN');
        var industry = col(c, 'Industria ES',  'Industria EN');
        var link    = (idx['Link'] !== undefined ? c[idx['Link']] : '') || '';

        html += '<div class="idea-item">';
        html += '<h2 class="idea-item__title"><span class="idea-item__num">#' + num2 + '</span> ' + title2 + '</h2>';
        if (desc)     html += '<p class="idea-item__desc">' + desc + '</p>';
        if (why)      html += '<div class="idea-item__section"><p class="idea-item__section-label">' + whyLabel + '</p><p class="idea-item__section-text">' + why + '</p></div>';
        if (how)      html += '<div class="idea-item__section"><p class="idea-item__section-label">' + howLabel + '</p><p class="idea-item__section-text">' + how + '</p></div>';
        html += '<div class="idea-item__footer">';
        if (industry) html += '<span class="idea-item__meta-pill idea-item__meta-pill--highlight">' + industry + '</span>';
        if (link)     html += '<a href="' + link + '" target="_blank" class="idea-item__video-btn">' + btnLabel + '</a>';
        html += '</div></div>';
      }
      if (list) list.innerHTML = html || '<p style="color:#888;text-align:center;padding:32px 0;">No hay ideas aún.</p>';
    }

    var lastIdeasData = null;

    function loadIdeas() {
      var list = document.getElementById('ideas-list');
      if (list) list.innerHTML = '<div class="ideas-loading"><span></span><span></span><span></span></div>';
      var ts = Date.now();
      fetch(IDEAS_CSV_RAW + '&t=' + ts)
        .then(function(r) { if (!r.ok) throw new Error('direct failed'); return r.text(); })
        .catch(function() { return fetch(IDEAS_CSV_PROXY + '&t=' + ts).then(function(r) { return r.text(); }); })
        .then(function(text) { lastIdeasData = parseCSV(text); renderIdeas(lastIdeasData); })
        .catch(function(e) {
          console.error('loadIdeas error:', e);
          if (list) list.innerHTML = '<p style="color:#888;text-align:center;padding:32px 0;">Error cargando ideas. Intenta de nuevo.</p>';
        });
    }

      extraVideos: [

  var carouselIdx = 0;

  function goToSlide(idx) {
    carouselIdx = idx;
    carouselImg.style.opacity = '0';
    setTimeout(function() {
      carouselImg.src = carouselSlides[idx].img;
      carouselImg.style.objectPosition = carouselSlides[idx].objectPosition || 'center center';
      carouselTitle.textContent = lang === 'en' ? (carouselSlides[idx].titleEn || carouselSlides[idx].title) : carouselSlides[idx].title;
      carouselImg.style.opacity = '1';
    }, 220);
    carouselDots.forEach(function(d, i) { d.classList.toggle('active', i === idx); });
  }

  carouselDots.forEach(function(d) { d.addEventListener('click', function() { goToSlide(+d.dataset.idx); }); });
  document.getElementById('carousel-prev').addEventListener('click', function() { goToSlide((carouselIdx - 1 + carouselSlides.length) % carouselSlides.length); });
  document.getElementById('carousel-next').addEventListener('click', function() { goToSlide((carouselIdx + 1) % carouselSlides.length); });
  setInterval(function() { goToSlide((carouselIdx + 1) % carouselSlides.length); }, 5000);

  function openFeaturedDetail(idx, pushState) {

      if (slide.extraVideos) {

          } else if (ev.video) {
            videoHtml += '<video controls style="width:100%;aspect-ratio:16/9;border-radius:14px;background:#000;" src="' + ev.video + '"></video>';
          } else {
            videoHtml += '<div style="width:100%;aspect-ratio:16/9;background:#141414;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px;letter-spacing:0.08em;">Video próximamente</div>';

    }
    // Update URL with slide slug
    if (pushState !== false && slide.slug) {
      history.pushState({ view: 'featured', slug: slide.slug }, '', '#featured/' + slide.slug);
    }
    document.getElementById('view-main').style.display     = 'none';
    document.getElementById('view-ideas').style.display    = 'none';
    document.getElementById('view-featured').style.display = 'block';
    window.scrollTo(0, 0);
  }

  document.getElementById('carousel-img-wrap').addEventListener('click', function(e) {
    if (e.target.classList.contains('carousel-arrow')) return;
    openFeaturedDetail(carouselIdx);
  });

    /* INIT */
    applyLang('es');

    // Read hash on load to open correct view/slide
    (function() {
      var hash = window.location.hash.replace('#', '');
      if (!hash) return;
      if (hash === 'ideas') { showView('ideas', false); return; }
      if (hash.indexOf('featured/') === 0) {
        var slug = hash.replace('featured/', '');
        var idx = carouselSlides.findIndex(function(s) { return s.slug === slug; });
        if (idx !== -1) openFeaturedDetail(idx, false);
        else showView('featured', false);
        return;
      }
      if (hash === 'featured') { showView('featured', false); }
    })();
